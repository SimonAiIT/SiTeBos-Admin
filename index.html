<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <title>SiTeBoS Admin Assistant</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script id="tg-admin-security-guard">
    (function() {
        'use strict';
        try {
            var urlParams = new URLSearchParams(window.location.search || '');
            var ash = urlParams.get('ash');
            var tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
            var hasTgData = tg && typeof tg.initData === 'string' && tg.initData.trim() !== '' && tg.platform !== 'unknown';
            var hasAsh = typeof ash === 'string' && ash.trim() !== '';

            if (!hasTgData && !hasAsh) {
                try { window.stop(); } catch(e) {}
                document.documentElement.innerHTML = '<head><title>Accesso Negato - SiTeBoS Admin</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>html,body{margin:0;padding:0;width:100%;height:100%;background:#090d16;color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;align-items:center;justify-content:center;text-align:center;box-sizing:border-box;padding:24px;}.card{max-width:400px;width:100%;padding:36px 28px;background:#111827;border:1px solid #1f2937;border-radius:20px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.7);}.icon{font-size:52px;margin-bottom:16px;}h1{font-size:18px;font-weight:800;margin:0 0 10px 0;color:#ef4444;letter-spacing:0.06em;text-transform:uppercase;}p{font-size:13px;color:#94a3b8;margin:0;line-height:1.6;}</style></head><body><div class="card"><div class="icon">🚫</div><h1>Accesso Riservato Admin</h1><p>Questa console amministrativa è protetta ed accessibile <b>esclusivamente</b> dall\'applicazione Telegram autorizzata.<br><br>Se sei l\'Owner, apri la dashboard tramite il Bot Telegram di gestione.</p></div></body>';
                throw new Error("ADMIN_SECURITY_BLOCK: Sessione Telegram non rilevata.");
            } else {
                if (tg) {
                    try { tg.ready(); } catch(e) {}
                    try { tg.expand(); } catch(e) {}
                }
            }
        } catch (err) {
            if (err && err.message && err.message.indexOf("ADMIN_SECURITY_BLOCK") !== -1) {
                throw err;
            }
        }
    })();
    </script>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </head>
  <body class="bg-white text-slate-950 font-sans antialiased selection:bg-slate-900 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
